<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NED Marathon — Notes</title>
    <style>
      :root {
        --bg: #f4f6f9;
        --card-bg: #fff;
        --text: #222;
        --text-muted: #777;
        --heading: #1a3d63;
        --shadow: rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .wrap {
        width: 100%;
        max-width: 480px;
        text-align: center;
      }

      h1 {
        color: var(--heading);
        font-size: 1.8em;
        margin-bottom: 4px;
      }

      p.sub {
        color: var(--text-muted);
        margin-top: 0;
        margin-bottom: 32px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .card {
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 4px 12px var(--shadow);
        padding: 28px 16px;
        text-decoration: none;
        color: var(--text);
        font-weight: 600;
        font-size: 1.05em;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px var(--shadow);
      }

      .icon {
        display: block;
        font-size: 2em;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>📚 NED Marathon Notes</h1>
      <p class="sub">Pick a subject to start revising</p>

      <div class="grid">
        <a class="card" href="comp.html">
          <span class="icon">💻</span>
          Computer Science
        </a>
        <a class="card" href="physics.html">
          <span class="icon">⚛️</span>
          Physics
        </a>
        <a class="card" href="english.html">
          <span class="icon">📖</span>
          English
        </a>
        <a class="card" href="math.html">
          <span class="icon">➗</span>
          Math
        </a>
      </div>
    </div>
  </body>
</html>
